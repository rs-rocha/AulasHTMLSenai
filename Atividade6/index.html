<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cracha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="container p-5">
        <h1>Crachá de Funcionario</h1><br>
        <div class="container p-3">
            <form>
                <div>
                    <label for="nome">Nome: </label><br>
                    <input type="text" id="nome"><br><br>
                </div>
                <div>
                    <label for="idade">Idade: </label><br>
                    <input type="text" id="idade"><br><br>
                </div>
                <div>
                    <label for="cargo">Cargo: </label><br>
                    <input type="text" id="cargo"><br><br>
                </div>
                <div>
                    <label for="departamento">Departamento: </label><br>
                    <input type="text" id="departamento"><br><br>
                </div>
                <div>
                    <input type="checkbox" id="acessoRestrito">
                    <label for="acessoRestrito">Acesso Restrito: </label><br><br>
                </div>
                <button type="button" class="btn btn-primary" onclick="cadastrarFuncionario()">Cadastrar</button>
            </form>
        </div>

        <script src="cracha.js"></script>
    </main>
    
</body>
</html>
